<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>顺德美食地图 · 高德</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans SC','PingFang SC',sans-serif; background:#faf9f7; }

  .header {
    background: linear-gradient(135deg, #fff7ed, #fef3c7);
    padding: 16px 20px;
    border-bottom: 1px solid #f0e6d3;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  .header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #c2410c, #b45309);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .sub { font-size: 12px; color: #78716c; }

  .legend-panel {
    background: #fff; border-bottom: 1px solid #e7e5e4;
    padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: #57534e; cursor: pointer;
    padding: 3px 8px; border-radius: 8px; border: 1px solid transparent;
    transition: all 0.2s; user-select: none;
  }
  .legend-item:hover { background: #fafaf9; }
  .legend-item.inactive { opacity: 0.3; border-color: #e7e5e4; }
  .legend-dot {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0;
  }
  .legend-count {
    background: #f5f5f4; color: #78716c; font-size: 10px;
    padding: 1px 5px; border-radius: 8px; font-weight: 500;
  }

  #map { height: calc(100vh - 110px); width: 100%; }

  .amap-info-content {
    border-radius: 12px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
    padding: 0 !important;
  }
  .poi-popup { font-family:'Noto Sans SC',sans-serif; min-width: 200px; padding: 12px 14px; }
  .poi-popup .p-name { font-size: 15px; font-weight: 600; color: #1c1917; margin-bottom: 4px; }
  .poi-popup .p-cat { font-size: 11px; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-bottom: 6px; }
  .poi-popup .p-meta { font-size: 13px; color: #57534e; line-height: 1.6; }
  .poi-popup .p-meta .rating { color: #d97706; font-weight: 500; }
  .poi-popup .p-meta .cost { color: #059669; font-weight: 500; }
  .poi-popup .p-note { font-size: 12px; color: #78716c; margin-top: 2px; font-style: italic; }
  .poi-popup .p-nav {
    display: inline-block; margin-top: 8px; padding: 5px 14px;
    background: #1677ff; color: #fff; border-radius: 8px;
    font-size: 13px; text-decoration: none; font-weight: 500;
  }
  .poi-popup .p-nav:hover { background: #0958d9; }
</style>
<script src="https://webapi.amap.com/maps?v=2.0&key=dd50742d354a382c4e8572f1a32b4328"></script>
</head>
<body>

<div class="header">
  <div>
    <h1>📍 顺德美食全景地图</h1>
    <div class="sub">高德地图 · 点击标记查看详情 · 可直接导航</div>
  </div>
</div>

<div class="legend-panel" id="legendPanel"></div>
<div id="map"></div>

<script>
const categories = {
  attraction: { label: '🏛 景点', color: '#7c3aed', emoji: '🏛', order: 0 },
  hotel_5star: { label: '🏨 五星酒店', color: '#b45309', emoji: '🏨', order: 1 },
  hotel_budget: { label: '🏠 经济酒店', color: '#92400e', emoji: '🏠', order: 2 },
  dessert: { label: '🍮 甜品咖啡', color: '#ec4899', emoji: '🍮', order: 3 },
  claypot: { label: '🍚 煲仔饭', color: '#ea580c', emoji: '🍚', order: 4 },
  porridge: { label: '🥣 粥/粥水火锅', color: '#0284c7', emoji: '🥣', order: 5 },
  hotpot: { label: '🍲 火锅', color: '#dc2626', emoji: '🍲', order: 6 },
  private: { label: '🍽 私房菜/饭馆', color: '#059669', emoji: '🍽', order: 7 },
  other: { label: '🍜 特色小吃', color: '#d97706', emoji: '🍜', order: 8 },
};

const pois = [
  // Attractions
  {name:"清晖园", lng:113.255086, lat:22.835613, cat:"attraction", rating:"4.8", cost:"¥15门票", addr:"清晖路23号", note:"岭南四大名园"},
  {name:"顺峰山公园", lng:113.286112, lat:22.819589, cat:"attraction", rating:"4.8", cost:"免费", addr:"南国东路40号", note:"亚洲最大牌坊"},
  {name:"逢简水乡", lng:113.154462, lat:22.813153, cat:"attraction", rating:"4.5", cost:"免费", addr:"逢简村", note:"岭南水乡"},
  {name:"碧江金楼", lng:113.262272, lat:22.942558, cat:"attraction", rating:"4.6", cost:"", addr:"泰宁西路6号", note:"清代古建筑"},
  {name:"欢乐海岸PLUS", lng:113.303499, lat:22.816365, cat:"attraction", rating:"4.8", cost:"", addr:"欢乐大道1号", note:"拍照打卡"},

  // 5-star hotels
  {name:"顺德美的万豪酒店", lng:113.272, lat:22.824, cat:"hotel_5star", rating:"4.4", cost:"", addr:"南国东路388号", note:"Marriott · 距清晖园2.2km"},
  {name:"顺德喜来登酒店", lng:113.268, lat:22.818, cat:"hotel_5star", rating:"4.4", cost:"", addr:"德胜中路11号", note:"Sheraton"},
  {name:"顺德希尔顿酒店", lng:113.321, lat:22.781, cat:"hotel_5star", rating:"4.6", cost:"", addr:"桂洲大道67号", note:"Hilton · 容桂区"},
  {name:"顺德泷居酒店", lng:113.253, lat:22.810, cat:"hotel_5star", rating:"4.7", cost:"", addr:"德胜西路11号", note:"精品五星"},

  // Budget hotels
  {name:"桔子水晶酒店", lng:113.254943, lat:22.837107, cat:"hotel_budget", rating:"4.9", cost:"", addr:"清晖园旁166m", note:"性价比之选"},
  {name:"汉庭酒店(清晖园)", lng:113.256405, lat:22.834424, cat:"hotel_budget", rating:"4.8", cost:"", addr:"清晖路148号", note:"距清晖园189m"},
  {name:"麗枫酒店(清晖园)", lng:113.255851, lat:22.834092, cat:"hotel_budget", rating:"4.3", cost:"", addr:"清晖园店", note:""},

  // Dessert & Coffee
  {name:"仁信甜品", lng:113.258257, lat:22.835107, cat:"dessert", rating:"4.5", cost:"¥28/人", addr:"东乐路3号德富大厦", note:"双皮奶·姜撞奶"},
  {name:"CBR COFFEE", lng:113.261098, lat:22.836269, cat:"dessert", rating:"4.3", cost:"¥28/人", addr:"信怡楼115铺", note:"精品咖啡"},
  {name:"豆福甜汤", lng:113.293286, lat:22.810292, cat:"dessert", rating:"4.4", cost:"¥19/人", addr:"苏龙街八巷", note:"夜宵甜汤"},
  {name:"金榜欢记牛乳", lng:113.247774, lat:22.837536, cat:"dessert", rating:"4.4", cost:"", addr:"金榜上街19号", note:"传统牛乳"},
  {name:"欢姐伦教糕", lng:113.205957, lat:22.881584, cat:"dessert", rating:"4.5", cost:"¥36/人", addr:"伦教镇北海大道北50号", note:"伦教糕发源地"},

  // Claypot rice
  {name:"探记煲仔饭", lng:113.255437, lat:22.834153, cat:"claypot", rating:"4.6", cost:"¥62/人", addr:"华盖里四巷26号", note:"腊味煲仔饭"},
  {name:"红星光发煲仔饭", lng:113.277428, lat:22.750447, cat:"claypot", rating:"4.5", cost:"¥71/人", addr:"容桂文海西路7号", note:"容桂区"},

  // Porridge
  {name:"开眉粥·粥水火锅", lng:113.268879, lat:22.818427, cat:"porridge", rating:"4.7", cost:"¥58/人", addr:"广源8街4号之二", note:"粥水火锅+顺德鱼生"},
  {name:"石洪品粥", lng:113.265103, lat:22.819017, cat:"porridge", rating:"4.6", cost:"¥111/人", addr:"福祥街2号", note:"高端粥品"},
  {name:"山泉粥", lng:113.261806, lat:22.850886, cat:"porridge", rating:"4.5", cost:"¥78/人", addr:"桂畔里F1层", note:""},
  {name:"毋米粥(禅城)", lng:113.106139, lat:23.002731, cat:"porridge", rating:"4.7", cost:"¥90/人", addr:"禅城区", note:"非顺德·禅城店"},
  {name:"荣记猪杂粥", lng:113.125262, lat:23.041993, cat:"porridge", rating:"4.5", cost:"¥56/人", addr:"禅城区鲤鱼沙路", note:"非顺德·禅城"},

  // Hotpot
  {name:"杏坛公平靓正", lng:113.263276, lat:22.810334, cat:"hotpot", rating:"4.7", cost:"¥87/人", addr:"延年路32号", note:"粥底火锅"},
  {name:"潮汕俊记牛肉火锅", lng:113.167142, lat:23.047457, cat:"hotpot", rating:"4.7", cost:"¥76/人", addr:"南海桂城", note:"非顺德·南海"},

  // Private kitchen
  {name:"文巧食店", lng:113.258963, lat:22.837700, cat:"private", rating:"4.4", cost:"¥73/人", addr:"聚源直街3巷6号", note:"私房菜"},
  {name:"醉沁苑私房菜", lng:113.284617, lat:22.802050, cat:"private", rating:"4.5", cost:"¥79/人", addr:"南江中路八巷4号", note:"需提前预约"},
  {name:"友口福饭馆", lng:113.205118, lat:23.039865, cat:"private", rating:"4.0", cost:"¥28/人", addr:"南海平北美食街9号", note:"非顺德"},
  {name:"永锋饭店", lng:113.226984, lat:22.993166, cat:"private", rating:"4.5", cost:"¥63/人", addr:"南海三山", note:"非顺德"},
  {name:"黄但记知味食府", lng:113.238366, lat:22.953228, cat:"private", rating:"4.5", cost:"¥78/人", addr:"陈村景明路18号", note:"陈村粉名店"},
  {name:"顺峰山庄", lng:113.231038, lat:22.952152, cat:"private", rating:"4.5", cost:"¥93/人", addr:"陈村景成路1号", note:"大型酒楼"},

  // Other specialties
  {name:"大润龍眼炸猪肉", lng:113.256380, lat:22.833854, cat:"other", rating:"4.5", cost:"¥21/人", addr:"丁字直街7号", note:"炸猪肉小吃"},
  {name:"华叔茶記", lng:113.257565, lat:22.835633, cat:"other", rating:"4.7", cost:"¥39/人", addr:"东乐路15号", note:"猪脚姜·粉面"},
  {name:"沙煲兄弟", lng:113.260316, lat:22.837669, cat:"other", rating:"4.6", cost:"¥38/人", addr:"聚源直街59号", note:"煲仔菜"},
  {name:"阳辉里", lng:113.266056, lat:22.882856, cat:"other", rating:"4.7", cost:"¥78/人", addr:"三洲乌洲路", note:"鸡包饭"},
  {name:"大门公小公馆", lng:113.257255, lat:22.811935, cat:"other", rating:"4.7", cost:"¥60/人", addr:"田心村巴路二街6号", note:"地道早茶"},
  {name:"民信老铺", lng:113.114509, lat:23.031653, cat:"other", rating:"4.5", cost:"¥24/人", addr:"禅城人民路", note:"非顺德·禅城"},
  {name:"均安蒸猪", lng:113.156011, lat:22.813678, cat:"other", rating:"4.0", cost:"¥38/人", addr:"均安镇", note:"特色蒸猪"},
];

// ===== AMap Init =====
const map = new AMap.Map('map', {
  zoom: 12,
  center: [113.26, 22.83],
  mapStyle: 'amap://styles/whitesmoke',
});

// Markers grouped by category
const markerGroups = {};
const counts = {};
Object.keys(categories).forEach(k => { markerGroups[k] = []; counts[k] = 0; });

let currentInfoWindow = null;

pois.forEach(p => {
  if (!p.lat || !p.lng) return;
  const cat = categories[p.cat];
  if (!cat) return;
  counts[p.cat]++;

  const marker = new AMap.Marker({
    position: [p.lng, p.lat],
    content: `<div style="
      width:30px;height:30px;border-radius:50%;
      background:${cat.color};
      display:flex;align-items:center;justify-content:center;
      font-size:15px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      border:2px solid #fff;
      cursor:pointer;
    ">${cat.emoji}</div>`,
    offset: new AMap.Pixel(-15, -15),
    extData: p,
  });

  const costHtml = p.cost ? `<span style="color:#059669;font-weight:500">${p.cost}</span> · ` : '';
  const noteHtml = p.note ? `<div class="p-note">${p.note}</div>` : '';
  // 高德导航链接（手机端直接唤起高德APP）
  const navUrl = `https://uri.amap.com/marker?position=${p.lng},${p.lat}&name=${encodeURIComponent(p.name)}&callnative=1`;

  const infoWindow = new AMap.InfoWindow({
    content: `
      <div class="poi-popup">
        <div class="p-name">${cat.emoji} ${p.name}</div>
        <span class="p-cat" style="background:${cat.color}15;color:${cat.color};border:1px solid ${cat.color}30">${cat.label}</span>
        <div class="p-meta">
          <span class="rating">★ ${p.rating}</span> · ${costHtml}${p.addr}
        </div>
        ${noteHtml}
        <a class="p-nav" href="${navUrl}" target="_blank">📍 高德导航</a>
      </div>
    `,
    offset: new AMap.Pixel(0, -18),
    closeWhenClickMap: true,
  });

  marker.on('click', () => {
    if (currentInfoWindow) currentInfoWindow.close();
    infoWindow.open(map, marker.getPosition());
    currentInfoWindow = infoWindow;
  });

  marker.setMap(map);
  markerGroups[p.cat].push(marker);
});

// Fit all markers
const allPositions = pois.filter(p => p.lat && p.lng).map(p => [p.lng, p.lat]);
map.setBounds(new AMap.Bounds(
  [Math.min(...allPositions.map(p=>p[0])) - 0.01, Math.min(...allPositions.map(p=>p[1])) - 0.01],
  [Math.max(...allPositions.map(p=>p[0])) + 0.01, Math.max(...allPositions.map(p=>p[1])) + 0.01]
));

// Build legend with toggle
const panel = document.getElementById('legendPanel');
const sortedCats = Object.entries(categories).sort((a,b) => a[1].order - b[1].order);

sortedCats.forEach(([key, cat]) => {
  const count = counts[key] || 0;
  if (count === 0) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <span class="legend-dot" style="background:${cat.color};color:#fff;font-size:11px">${cat.emoji}</span>
    <span>${cat.label}</span>
    <span class="legend-count">${count}</span>
  `;
  let visible = true;
  item.addEventListener('click', () => {
    visible = !visible;
    item.classList.toggle('inactive');
    markerGroups[key].forEach(m => visible ? m.show() : m.hide());
  });
  panel.appendChild(item);
});
</script>
</body>
</html>
